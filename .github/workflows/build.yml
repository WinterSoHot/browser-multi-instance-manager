name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: x64
            artifact-suffix: ''
          - arch: arm64
            artifact-suffix: '-arm64'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: dist/*.dmg
          retention-days: 5

  build-win:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/*.exe
          retention-days: 5

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        run: |
          # Install jq
          sudo apt-get update && sudo apt-get install -y jq

          TAG_NAME=${GITHUB_REF#refs/tags/}

          # Create release via GitHub API
          curl -L -X POST https://api.github.com/repos/${{ github.repository }}/releases \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "tag_name": "'"$TAG_NAME"'",
              "name": "'"$TAG_NAME"'",
              "body": "Release '"$TAG_NAME"' built with electron-builder",
              "draft": false,
              "prerelease": false
            }' > release.json

          # Get upload URL
          UPLOAD_URL=$(cat release.json | jq -r '.upload_url' | sed 's/{?name,label}//')
          RELEASE_ID=$(cat release.json | jq -r '.id')

          # Upload DMG x64
          for f in artifacts/dmg-x64/*.dmg; do
            [ -f "$f" ] && curl -L -X POST "$UPLOAD_URL?name=$(basename $f)" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$f"
          done

          # Upload DMG arm64
          for f in artifacts/dmg-arm64/*.dmg; do
            [ -f "$f" ] && curl -L -X POST "$UPLOAD_URL?name=$(basename $f)" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$f"
          done

          # Upload EXE
          for f in artifacts/exe/*.exe; do
            [ -f "$f" ] && curl -L -X POST "$UPLOAD_URL?name=$(basename $f)" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$f"
          done

          echo "Release created successfully!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}