<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浏览器多实例管理器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>浏览器多实例管理器</h1>
      <button id="openSettings" class="btn btn-secondary btn-small">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        设置
      </button>
    </header>

    <section class="profiles-section">
      <div class="section-header">
        <h2>配置列表</h2>
        <div class="header-actions">
          <div class="view-toggle-group">
            <button id="viewListBtn" class="btn btn-secondary btn-small" title="列表视图">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
              </svg>
            </button>
            <button id="viewGridBtn" class="btn btn-secondary btn-small" title="网格视图">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
            </button>
          </div>
          <button id="launchSelectedBtn" class="btn btn-success" style="display: none;">启动选中 (<span id="selectedCount">0</span>)</button>
          <button id="closeSelectedBtn" class="btn btn-danger" style="display: none;">关闭选中 (<span id="closeSelectedCount">0</span>)</button>
          <button id="selectAllBtn" class="btn btn-secondary btn-small">全选</button>
          <button id="openAddModal" class="btn btn-primary">+ 新建配置</button>
        </div>
      </div>

      <!-- Search and Filter Bar -->
      <div class="search-bar">
        <div class="search-input-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="M21 21l-4.35-4.35"></path>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="搜索配置名称...">
        </div>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="chrome">Chrome</button>
          <button class="filter-btn" data-filter="firefox">Firefox</button>
          <button class="filter-btn" data-filter="edge">Edge</button>
          <button class="filter-btn" data-filter="zen">Zen</button>
        </div>
      </div>

      <div id="profilesList" class="profiles-list view-list">
        <p class="empty-message">暂无配置，请点击上方按钮添加</p>
      </div>
    </section>
  </div>

  <!-- 添加配置弹窗 -->
  <div id="addModal" class="modal">
    <div class="modal-content">
      <h3>新建配置</h3>
      <form id="addProfileForm">
        <div class="form-group">
          <label for="browserType">浏览器</label>
          <select id="browserType" required>
            <option value="chrome">Google Chrome</option>
            <option value="firefox">Firefox</option>
            <option value="edge">Microsoft Edge</option>
            <option value="zen">Zen Browser</option>
          </select>
        </div>
        <div class="form-group">
          <label for="profileName">配置名称</label>
          <input type="text" id="profileName" placeholder="例如：工作、个人" required>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">确认</button>
          <button type="button" id="cancelAdd" class="btn btn-secondary">取消</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 重命名弹窗 -->
  <div id="renameModal" class="modal">
    <div class="modal-content">
      <h3>重命名</h3>
      <div class="form-group">
        <label for="newProfileName">新名称</label>
        <input type="text" id="newProfileName" required>
      </div>
      <div class="modal-actions">
        <button id="confirmRename" class="btn btn-primary">确认</button>
        <button id="cancelRename" class="btn btn-secondary">取消</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="index.js"></script>
</body>
</html>
