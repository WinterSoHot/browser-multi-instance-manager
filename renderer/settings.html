<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 浏览器多实例管理器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>浏览器设置</h1>
      <button id="backToHome" class="btn btn-secondary btn-small back-btn">返回主页</button>
    </header>

    <section class="settings-section">
      <div class="section-header">
        <h2>自定义浏览器路径</h2>
        <div class="platform-info" id="platformInfo"></div>
      </div>

      <div class="settings-description">
        <p>配置各浏览器的可执行文件路径留空使用系统默认路径</p>
      </div>

      <div id="browserSettingsList" class="browser-settings-list">
        <!-- Browser settings will be loaded here -->
      </div>

      <div class="settings-actions">
        <button id="saveSettings" class="btn btn-primary">保存设置</button>
        <button id="resetSettings" class="btn btn-secondary">重置为默认</button>
      </div>
    </section>
  </div>

  <script src="settings.js"></script>
</body>
</html>
